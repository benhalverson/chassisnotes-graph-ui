<div class="grid gap-2">
	@for (item of items; track item.type) {
		<button
			type="button"
			class="rounded-lg border px-3 py-2 text-left transition enabled:focus-visible:outline-none enabled:focus-visible:ring-2 enabled:focus-visible:ring-cyan-400 enabled:focus-visible:ring-offset-2 enabled:focus-visible:ring-offset-slate-900 disabled:cursor-not-allowed disabled:opacity-50"
			[class]="item.className"
			[disabled]="!diagramStore.hasActiveGraph()"
			(click)="addNode(item.type)"
		>
			<span class="block text-xs font-semibold uppercase tracking-wide text-slate-50">
				{{ item.label }}
			</span>
			<span class="mt-1 block text-xs leading-5 text-slate-300">
				{{ item.description }}
			</span>
		</button>
	}
</div>
