<header class="flex items-center gap-3 px-4 py-2 border-b border-slate-800 bg-slate-950/80">
	<a
		routerLink="/graphs"
		class="flex items-center gap-1 text-sm text-slate-400 transition-colors hover:text-slate-200"
		aria-label="Back to Graphs"
	>
		<span aria-hidden="true">&larr;</span>
		Back to Graphs
	</a>

	<span class="h-4 w-px bg-slate-700" aria-hidden="true"></span>

	<h1 class="text-sm font-semibold text-slate-100 truncate">
		{{ graphTitle() }}
	</h1>

	@if (saveStatusText(); as statusText) {
		<span class="ml-auto text-xs text-slate-400" aria-live="polite">
			{{ statusText }}
		</span>
	}
</header>
