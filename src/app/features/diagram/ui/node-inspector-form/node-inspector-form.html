<form class="space-y-2 rounded border border-slate-800 bg-slate-900 p-3" aria-label="Node inspector form">
	<h3 class="text-xs font-semibold uppercase tracking-wide text-slate-300">Node</h3>
	<label class="block text-xs text-slate-200">
		Title
		<input type="text" class="mt-1 w-full rounded border border-slate-700 bg-slate-950 px-2 py-1 text-slate-100" />
	</label>
	<label class="block text-xs text-slate-200">
		Confidence
		<select class="mt-1 w-full rounded border border-slate-700 bg-slate-950 px-2 py-1 text-slate-100">
			<option>Low</option>
			<option>Medium</option>
			<option>High</option>
		</select>
	</label>
</form>
