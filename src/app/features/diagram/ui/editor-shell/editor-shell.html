<section class="grid min-h-screen gap-3 p-3 lg:grid-cols-[18rem_1fr_20rem] lg:p-4">
	<app-left-sidebar></app-left-sidebar>

	<section class="flex min-h-[60dvh] flex-col gap-3" aria-label="Diagram workspace">
		<app-canvas-toolbar
			[hasGraph]="diagramStore.hasActiveGraph()"
			[busy]="diagramStore.loading() || diagramStore.mutating()"
			[statusText]="toolbarStatusText()"
			(fitRequested)="requestViewportAction('fit')"
			(zoomInRequested)="requestViewportAction('zoom-in')"
			(zoomOutRequested)="requestViewportAction('zoom-out')"
		></app-canvas-toolbar>
		<app-diagram-canvas [viewportAction]="viewportRequest()"></app-diagram-canvas>
	</section>

	<app-right-sidebar></app-right-sidebar>
</section>
