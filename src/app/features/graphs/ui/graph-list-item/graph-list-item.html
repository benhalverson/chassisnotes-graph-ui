@if (graph(); as item) {
	<article class="rounded-md border border-slate-800 bg-slate-900 p-3">
		<header class="flex items-center justify-between gap-3">
			<h2 class="text-sm font-semibold text-slate-100">{{ item.name }}</h2>
			<span class="rounded bg-slate-800 px-2 py-1 text-xs text-slate-300">
				Updated {{ formatUpdatedAt(item.updatedAt) }}
			</span>
		</header>
		<p class="mt-2 text-xs text-slate-300">{{ item.chassis }} • {{ item.classType }} • {{ item.surface }}</p>
		<div class="mt-3 flex flex-wrap gap-2">
			<button
				type="button"
				(click)="openGraph.emit(item.id)"
				class="rounded border border-slate-700 px-2 py-1 text-xs text-slate-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-300"
			>
				Open
			</button>
			<button
				type="button"
				(click)="duplicateGraph.emit(item.id)"
				class="rounded border border-slate-700 px-2 py-1 text-xs text-slate-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-300"
			>
				Duplicate
			</button>
			<button
				type="button"
				(click)="deleteGraph.emit(item.id)"
				class="rounded border border-red-500/40 bg-red-500/10 px-2 py-1 text-xs text-red-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-300"
			>
				Delete
			</button>
		</div>
	</article>
}
