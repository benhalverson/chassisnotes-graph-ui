<main class="min-h-screen bg-slate-950 text-slate-100">
	<section class="mx-auto flex w-full max-w-6xl flex-col gap-4 p-4 md:p-6">
		<h1 class="text-2xl font-semibold tracking-tight">Graphs</h1>
		<p class="text-sm text-slate-300">
			Create, duplicate, and open your 2WD carpet setup relationship maps.
		</p>

		@if (graphsStore.error(); as errorMessage) {
			<p class="rounded-md border border-red-500/40 bg-red-500/10 px-3 py-2 text-sm text-red-100">
				{{ errorMessage }}
			</p>
		}

		<app-graph-library-toolbar
			[defaultTemplateLabel]="graphsStore.templates().length ? graphsStore.defaultTemplate().name : 'starter template'"
			(createRequested)="createFromDefaultTemplate()"
		></app-graph-library-toolbar>

		<div class="grid gap-4 lg:grid-cols-[2fr_1fr]">
			<section
				aria-label="Saved graphs"
				class="rounded-lg border border-slate-800 bg-slate-900/70 p-3"
			>
				<app-graph-list
					[graphs]="graphsStore.graphs()"
					(openGraph)="openGraph($event)"
					(duplicateGraph)="duplicateGraph($event)"
					(deleteGraph)="graphsStore.requestDelete($event)"
				></app-graph-list>
			</section>

			<section
				aria-label="Starter templates"
				class="rounded-lg border border-slate-800 bg-slate-900/70 p-3"
			>
				<app-template-picker
					[templates]="graphsStore.templates()"
					(createFromTemplate)="createFromTemplate($event)"
				></app-template-picker>
			</section>
		</div>
	</section>

	@if (graphsStore.pendingDeleteGraph(); as pendingDeleteGraph) {
		<app-confirm-delete-graph-dialog
			[graphName]="pendingDeleteGraph.name"
			(confirmDelete)="graphsStore.confirmDelete()"
			(cancelDelete)="graphsStore.cancelDelete()"
		></app-confirm-delete-graph-dialog>
	}
</main>
